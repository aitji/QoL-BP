name: Auto Release!

on:
  push:
    branches:
      - behavior_packs
    paths:
      - manifest.json
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout behavior_packs branch
        uses: actions/checkout@v6
        with:
          ref: behavior_packs
          fetch-depth: 2

      - name: Read old and new BP manifest versions
        if: github.event_name == 'push'
        id: versions
        run: |
          NEW_VER=$(node -e "const m=require('./manifest.json'); console.log(JSON.stringify(m.header.version));")

          OLD_VER=$(git show HEAD~1:manifest.json | node -e "
            let d='';
            process.stdin.on('data', c => d+=c);
            process.stdin.on('end', () => {
              const m = JSON.parse(d);
              console.log(JSON.stringify(m.header.version));
            });
          ")

          echo "OLD_VERSION=$OLD_VER" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "Old version: $OLD_VER"
          echo "New version: $NEW_VER"

      - name: Determine release type
        if: github.event_name == 'push'
        id: check
        env:
          OLD_VERSION: ${{ env.OLD_VERSION }}
          NEW_VERSION: ${{ env.NEW_VERSION }}
        run: node .github/scripts/check-version.js

      - name: Read manifest version (dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: check_dispatch
        run: |
          VERSION=$(node -e "const m=require('./manifest.json'); const v=m.header.version; console.log(Array.isArray(v)?v.join('.'):v);")
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [ "$PATCH" -eq 0 ]; then
            RELEASE_TYPE="release"
          else
            RELEASE_TYPE="prerelease"
          fi

          PACK_NAME="QoF-${VERSION}.mcaddon"

          echo "version_string=${VERSION}" >> $GITHUB_OUTPUT
          echo "pack_name=${PACK_NAME}"    >> $GITHUB_OUTPUT
          echo "release_type=${RELEASE_TYPE}" >> $GITHUB_OUTPUT
          echo "changed=true"             >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Release type: $RELEASE_TYPE"
          echo "Pack: $PACK_NAME"

      - name: Resolve version outputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=${{ steps.check_dispatch.outputs.changed }}"               >> $GITHUB_OUTPUT
            echo "version_string=${{ steps.check_dispatch.outputs.version_string }}" >> $GITHUB_OUTPUT
            echo "pack_name=${{ steps.check_dispatch.outputs.pack_name }}"           >> $GITHUB_OUTPUT
            echo "release_type=${{ steps.check_dispatch.outputs.release_type }}"     >> $GITHUB_OUTPUT
          else
            echo "changed=${{ steps.check.outputs.changed }}"               >> $GITHUB_OUTPUT
            echo "version_string=${{ steps.check.outputs.version_string }}" >> $GITHUB_OUTPUT
            echo "pack_name=${{ steps.check.outputs.pack_name }}"           >> $GITHUB_OUTPUT
            echo "release_type=${{ steps.check.outputs.release_type }}"     >> $GITHUB_OUTPUT
          fi

      - name: Read changelogs
        if: steps.resolve.outputs.changed == 'true'
        id: changelogs
        run: |
          VERSION="${{ steps.resolve.outputs.version_string }}"
          MINOR_VERSION=$(echo "$VERSION" | cut -d. -f1-2)

          EXACT_FILE=".github/changelogs/v${VERSION}.md"
          MINOR_FILE=".github/changelogs/v${MINOR_VERSION}.md"

          if [ -f "$EXACT_FILE" ]; then
            echo "Found exact changelogs: $EXACT_FILE"
            CHANGELOGS_SOURCE="$EXACT_FILE"
          elif [ -f "$MINOR_FILE" ]; then
            echo "Found minor fallback changelogs: $MINOR_FILE"
            CHANGELOGS_SOURCE="$MINOR_FILE"
          else
            echo "No changelogs found for v${VERSION} or v${MINOR_VERSION}, using auto-generated notes"
            echo "has_changelogs=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          cat "$CHANGELOGS_SOURCE" > /tmp/changelogs_body.md
          echo "has_changelogs=true" >> $GITHUB_OUTPUT

      - name: Set DEBUG to false (behavior_packs)
        if: steps.resolve.outputs.changed == 'true'
        run: node .github/scripts/set-debug.js

      - name: Cache dependencies
        if: steps.resolve.outputs.changed == 'true'
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .github/scripts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package.json', '.github/scripts/minify.js') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies (if not cached)
        if: steps.resolve.outputs.changed == 'true' && steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          npm install --no-save typescript
          npm install --prefix .github/scripts terser

      - name: Build TypeScript (behavior_packs)
        if: steps.resolve.outputs.changed == 'true'
        run: npm run build

      - name: Minify JSON & JS (behavior_packs)
        if: steps.resolve.outputs.changed == 'true'
        run: node .github/scripts/minify.js

      - name: Zip behavior_packs mcpack
        if: steps.resolve.outputs.changed == 'true'
        run: |
          BP_PACK="QoF_v${{ steps.resolve.outputs.version_string }}_behavior_packs.mcpack"
          grep -v '^\s*#' build.gitignore \
            | grep -v '^\s*$' \
            | grep -v '^!' \
            | sed 's|/$||' \
            > /tmp/bp_exclude.txt

          zip -r "$BP_PACK" . -x@/tmp/bp_exclude.txt
          echo "BP_PACK=$BP_PACK" >> $GITHUB_ENV
          echo "Created: $BP_PACK"

      - name: Checkout resource_packs branch
        if: steps.resolve.outputs.changed == 'true'
        uses: actions/checkout@v6
        with:
          ref: resource_packs
          path: _rp

      - name: Read resource_packs version
        if: steps.resolve.outputs.changed == 'true'
        id: rp_version
        run: node .github/scripts/read-manifest.js _rp/manifest.json

      - name: Set DEBUG to false (resource_packs)
        if: steps.resolve.outputs.changed == 'true'
        working-directory: _rp
        run: node ../.github/scripts/set-debug.js --rp

      - name: Minify JSON & JS (resource_packs)
        if: steps.resolve.outputs.changed == 'true'
        run: node .github/scripts/minify.js --rp

      - name: Zip resource_packs mcpack
        if: steps.resolve.outputs.changed == 'true'
        run: |
          RP_PACK="QoF_v${{ steps.rp_version.outputs.rp_version }}_resource_packs.mcpack"
          grep -v '^\s*#' build.gitignore \
            | grep -v '^\s*$' \
            | grep -v '^!' \
            | sed 's|/$||' \
            > /tmp/rp_exclude.txt

          cd _rp && zip -r "../$RP_PACK" . -x@/tmp/rp_exclude.txt
          echo "RP_PACK=$RP_PACK" >> $GITHUB_ENV
          echo "Created: $RP_PACK"

      - name: Bundle into .mcaddon
        if: steps.resolve.outputs.changed == 'true'
        run: |
          ADDON_NAME="${{ steps.resolve.outputs.pack_name }}"
          zip "$ADDON_NAME" "$BP_PACK" "$RP_PACK"
          echo "Created: $ADDON_NAME"

      - name: Create / Update GitHub Release (with changelogs)
        if: steps.resolve.outputs.changed == 'true' && steps.changelogs.outputs.has_changelogs == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.resolve.outputs.version_string }}"
          name: "QoF v${{ steps.resolve.outputs.version_string }}"
          prerelease: ${{ steps.resolve.outputs.release_type == 'prerelease' }}
          files: ${{ steps.resolve.outputs.pack_name }}
          body_path: /tmp/changelogs_body.md
          generate_release_notes: false

      - name: Create / Update GitHub Release (auto notes)
        if: steps.resolve.outputs.changed == 'true' && steps.changelogs.outputs.has_changelogs == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.resolve.outputs.version_string }}"
          name: "QoF v${{ steps.resolve.outputs.version_string }}"
          prerelease: ${{ steps.resolve.outputs.release_type == 'prerelease' }}
          files: ${{ steps.resolve.outputs.pack_name }}
          generate_release_notes: true
