name: Auto Release!

on:
  push:
    branches:
      - main
    paths:
      - manifest.json

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read old and new manifest versions
        id: versions
        run: |
          NEW_VER=$(node -e "const m=require('./manifest.json'); console.log(JSON.stringify(m.header.version));")

          OLD_VER=$(git show HEAD~1:manifest.json | node -e "
            let d='';
            process.stdin.on('data', c => d+=c);
            process.stdin.on('end', () => {
              const m = JSON.parse(d);
              console.log(JSON.stringify(m.header.version));
            });
          ")

          echo "OLD_VERSION=$OLD_VER" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "Old version: $OLD_VER"
          echo "New version: $NEW_VER"

      - name: Determine release type
        id: check
        env:
          OLD_VERSION: ${{ env.OLD_VERSION }}
          NEW_VERSION: ${{ env.NEW_VERSION }}
        run: node .github/scripts/check-version.js

      - name: Read changelog
        if: steps.check.outputs.changed == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.check.outputs.version_string }}"
          MINOR_VERSION=$(echo "$VERSION" | cut -d. -f1-2)

          EXACT_FILE=".github/changelog/v${VERSION}.md"
          MINOR_FILE=".github/changelog/v${MINOR_VERSION}.md"

          if [ -f "$EXACT_FILE" ]; then
            echo "Found exact changelog: $EXACT_FILE"
            CHANGELOG_SOURCE="$EXACT_FILE"
          elif [ -f "$MINOR_FILE" ]; then
            echo "Found minor fallback changelog: $MINOR_FILE"
            CHANGELOG_SOURCE="$MINOR_FILE"
          else
            echo "No changelog found for v${VERSION} or v${MINOR_VERSION}, using auto-generated notes"
            echo "has_changelog=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          cat "$CHANGELOG_SOURCE" > /tmp/changelog_body.md
          echo "has_changelog=true" >> $GITHUB_OUTPUT

      - name: Set DEBUG to false
        if: steps.check.outputs.changed == 'true'
        run: node .github/scripts/set-debug.js

      - name: Zip pack files
        if: steps.check.outputs.changed == 'true'
        run: |
          PACK_NAME="${{ steps.check.outputs.pack_name }}"
          zip -r "$PACK_NAME" . \
            -x "*.git*" \
            -x ".github/*" \
            -x ".gitattributes" \
            -x ".gitignore" \
            -x "*.md" \
            -x "node_modules/*"
          echo "Created: $PACK_NAME"

      - name: Create GitHub Release (with changelog)
        if: steps.check.outputs.changed == 'true' && steps.changelog.outputs.has_changelog == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.check.outputs.version_string }}"
          name: "QoF v${{ steps.check.outputs.version_string }}"
          prerelease: ${{ steps.check.outputs.release_type == 'prerelease' }}
          files: ${{ steps.check.outputs.pack_name }}
          body_path: /tmp/changelog_body.md
          generate_release_notes: false

      - name: Create GitHub Release (auto notes)
        if: steps.check.outputs.changed == 'true' && steps.changelog.outputs.has_changelog == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.check.outputs.version_string }}"
          name: "QoF v${{ steps.check.outputs.version_string }}"
          prerelease: ${{ steps.check.outputs.release_type == 'prerelease' }}
          files: ${{ steps.check.outputs.pack_name }}
          generate_release_notes: true
